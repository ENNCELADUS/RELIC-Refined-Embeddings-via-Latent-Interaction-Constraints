run_config:
  stages: ["evaluate"]
  seed: 47
  train_run_id: "20260308_002906"
  adapt_run_id: "20260308_002906"
  eval_run_id: "20260308_002906"
  load_checkpoint_path: "models/v3/train/20260308_002906/best_model.pth"
  save_best_only: true

device_config:
  device: "cuda"
  ddp_enabled: true
  use_mixed_precision: true

data_config:
  benchmark:
    name: "PRING"
    root_dir: "data/PRING"
    species: "human"
    split_strategy: "BFS"  # BFS | DFS | RANDOM_WALK
    processed_dir: "data/PRING/species_processed_data/human/BFS"
  embeddings:
    source: "esm3"
    cache_dir: "data/embeddings/esm3_1024"
  max_sequence_length: 1024
  dataloader:
    train_dataset: "data/PRING/species_processed_data/human/BFS/human_train_ppi.txt"
    valid_dataset: "data/PRING/species_processed_data/human/BFS/human_val_ppi.txt"
    test_dataset: "data/PRING/species_processed_data/human/BFS/human_test_ppi.txt"
    num_workers: 4
    pin_memory: true
    drop_last: true
    sampling:
      strategy: "ohem"  # none | ohem
      warmup_epochs: 5
      pool_multiplier: 4
      cap_protein: 4

model_config:
  model: "v3"
  input_dim: 1536
  d_model: 512
  encoder_layers: 3
  cross_attn_layers: 3
  n_heads: 8
  mlp_head:
    hidden_dims: [512, 256, 128]
    dropout: 0.20
    activation: "gelu"
    norm: "layernorm"
  regularization:
    dropout: 0.10
    token_dropout: 0.10
    cross_attention_dropout: 0.10
    stochastic_depth: 0.10

training_config:
  epochs: 50
  batch_size: 32
  early_stopping_patience: 10
  monitor_metric: "auprc"
  logging:
    validation_metrics: ["auprc", "auroc", "f1", "accuracy"]
  optimizer:
    type: "adamw"
    lr: 0.0001
    beta1: 0.9
    beta2: 0.999
    eps: 1.0e-8
    weight_decay: 0.05
  scheduler:
    type: "onecycle"
    max_lr: 0.0001
    pct_start: 0.10
    div_factor: 25
    final_div_factor: 10000
    anneal_strategy: "cos"
  loss:
    type: "bce_with_logits"
    pos_weight: 1.0
    label_smoothing: 0.05
  strategy:
    type: "none"
  domain_adaptation:
    enabled: true
    method: "shot"  # none | shot
    target_split: "test"
    epochs: 15
    beta: 0.3
    entropy_weight: 1.0
    diversity_weight: 1.0
    epsilon: 1.0e-5
    freeze_prefixes: ["output_head"]
    optimizer:
      type: "sgd"
      lr: 1.0e-4
      momentum: 0.9
      weight_decay: 1.0e-3
    scheduler:
      type: "shot_poly"  # shot_poly | none
      gamma: 10.0
      power: 0.75

evaluate:
  metrics:
    - "auroc"
    - "auprc"
    - "accuracy"
    - "sensitivity"
    - "specificity"
    - "precision"
    - "recall"
    - "f1"
    - "mcc"
